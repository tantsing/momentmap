<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moment map</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 搜索栏（仅管理员可见） -->
    <div id="search-bar" class="admin-only">
        <div class="search-inner">
            <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="#999">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <input id="search-input" type="text" placeholder="搜索地址以添加位置...">
            <button id="btn-search-clear" class="btn-clear">&times;</button>
        </div>
        <div id="search-results"></div>
    </div>

    <!-- 地图容器 -->
    <div id="map-container"></div>

    <!-- 底部位置列表面板（默认展开） -->
    <div id="bottom-panel" class="panel-expanded">
        <div id="panel-handle">
            <div class="handle-bar"></div>
        </div>
        <div id="panel-header">
            <span id="panel-title">位置列表 (<span id="panel-count">0</span>)</span>
            <div id="panel-actions">
                <button id="btn-add" class="btn-panel-action admin-only" title="添加位置">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
                <button id="btn-lock" class="btn-panel-action hidden" title="切换到访客模式">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                        <path d="M12 4C9.79 4 8 5.79 8 8h2c0-1.1.9-2 2-2s2 .9 2 2v2H7c-1.1 0-2 .9-2 2v7c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-7c0-1.1-.9-2-2-2h-1V8c0-2.21-1.79-4-4-4zm-5 6h10v7H7v-7zm5 1.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z" fill-rule="evenodd"/>
                    </svg>
                    <span>访客模式</span>
                </button>
            </div>
        </div>
        <!-- 折叠态：胶囊标签 -->
        <div id="panel-pills"></div>
        <!-- 展开态：完整卡片 -->
        <div id="panel-list">
            <div id="panel-empty">暂无位置数据</div>
        </div>
    </div>

    <!-- 添加/编辑弹窗 -->
    <div id="modal-overlay" class="modal-hidden">
        <div id="modal-sheet">
            <h3 id="modal-title">添加位置</h3>
            <div class="form-group">
                <label>咖啡店 <span class="required">*</span></label>
                <input id="form-name" type="text" placeholder="例如：星巴克(三里屯店)">
            </div>
            <div class="form-group">
                <label>省/直辖市</label>
                <select id="form-province"><option value="">请选择省份</option></select>
            </div>
            <div class="form-group">
                <label>市</label>
                <select id="form-city" disabled><option value="">请先选择省份</option></select>
            </div>
            <div class="form-group">
                <label>区/县</label>
                <select id="form-district" disabled><option value="">请先选择城市</option></select>
            </div>
            <div class="form-group">
                <label>详细地址</label>
                <input id="form-address" type="text" placeholder="例如：三里屯路19号">
            </div>
            <div class="form-hint-coords">
                <span id="hint-coords"></span>
            </div>
            <div class="form-group">
                <label>设备数量 <span class="required">*</span></label>
                <input id="form-count" type="number" min="1" step="1" placeholder="输入数量">
            </div>
            <div class="form-group">
                <label>备注</label>
                <input id="form-remark" type="text" placeholder="选填">
            </div>
            <div class="form-actions">
                <button id="btn-delete" class="btn-delete hidden">删除</button>
                <div class="form-actions-right">
                    <button id="btn-cancel" class="btn-cancel">取消</button>
                    <button id="btn-save" class="btn-save">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 管理验证弹窗 -->
    <div id="auth-overlay" class="modal-hidden">
        <div id="auth-sheet">
            <h3>管理验证</h3>
            <p class="auth-hint">请输入管理密码以解锁编辑功能</p>
            <div class="form-group">
                <input id="auth-password" type="password" placeholder="请输入密码" autocomplete="off">
            </div>
            <div id="auth-msg"></div>
            <div class="form-actions">
                <button id="btn-auth-cancel" class="btn-cancel">取消</button>
                <button id="btn-auth-confirm" class="btn-save">验证</button>
            </div>
        </div>
    </div>

    <!-- 高德地图安全密钥：必须在 SDK 之前配置 -->
    <script>
        window._AMapSecurityConfig = {
            securityJsCode: '85c97d0eaba58308bd49177536a8b059'
        };
    </script>
    <!-- 高德地图 JS API 2.0 -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=9aa8ecce1ec54acd9ac265afb38fe565&plugin=AMap.Geocoder,AMap.AutoComplete">
    </script>
    <!-- 主逻辑 -->
    <script src="app.js"></script>
</body>
</html>
